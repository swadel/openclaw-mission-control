name: Nightly Regression

on:
  schedule:
    # Runs every day at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: 'Skip E2E tests (faster run for debugging)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: nightly-regression
  cancel-in-progress: false

jobs:
  full-regression:
    name: Full Regression Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Configure git identity
        run: |
          git config --global user.email "ci@mission-control.dev"
          git config --global user.name "CI"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: API contract parity
        run: pnpm api:parity

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Prepare E2E environment
        run: cp .env.test .env

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: E2E tests
        if: ${{ github.event.inputs.skip_e2e != 'true' }}
        run: pnpm test:e2e

      - name: Upload E2E traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ github.run_id }}
          path: test-results/
          retention-days: 7
